# vim:ft=kitty
## name: Monokai Extended
## author: github.com/jonschlinkert
## blurb: Kitty terminal palette derived from Monokai Extended.tmTheme.
## The source tmTheme has syntax-scope colors that Kitty cannot represent
## directly, so those exact source colors are mapped onto Kitty's terminal
## color fields and ANSI palette.

#: The basic colors

foreground                      #f8f8f2
background                      #222222
selection_foreground            #f8f8f2
selection_background            #444444


#: Cursor colors

cursor                          #f8f8f0
cursor_text_color               #222222


#: URL underline color when hovering with mouse

url_color                       #66d9ef


#: kitty window border colors and terminal bell colors

active_border_color             #a6e22e
inactive_border_color           #586e75
bell_border_color               #f92672
visual_bell_color               #f92672


#: Tab bar colors

active_tab_foreground           #222222
active_tab_background           #a6e22e
inactive_tab_foreground         #75715e
inactive_tab_background         #222222
tab_bar_background              #222222
tab_bar_margin_color            #222222


#: Colors for marks (marked text in the terminal)

mark1_foreground                #000000
mark1_background                #ffe792
mark2_foreground                #f8f8f0
mark2_background                #f92672
mark3_foreground                #f8f8f0
mark3_background                #ae81ff


#: The basic 16 colors

#: black
color0                          #222222
color8                          #75715e

#: red
color1                          #f92672
color9                          #f92672

#: green
color2                          #a6e22e
color10                         #a6e22e

#: yellow
color3                          #e6db74
color11                         #fd971f

#: blue
color4                          #66d9ef
color12                         #3bc0f0

#: magenta
color5                          #be84ff
color13                         #ae81ff

#: cyan
color6                          #cfcfc2
color14                         #66d9ef

#: white
color7                          #f8f8f2
color15                         #ffffff
