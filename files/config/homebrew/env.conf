# Sourced from `kitty/environment.conf`. Keep this file limited to environment
# and PATH setup. Keep setup cheap and deterministic: no prompt logic, aliases,
# functions, widgets, completions, network access, git operations, secret-
# manager calls, or expensive command substitutions.

env HOMEBREW_NO_ENV_HINTS=1
