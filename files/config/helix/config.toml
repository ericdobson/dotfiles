# Repo-managed Helix config lives under XDG config alongside other app configs.

theme = "tinted-helix-themes-file"

[editor]
line-number = "relative"
continue-comments = false
bufferline = "multiple"
color-modes = true
trim-final-newlines = true
trim-trailing-whitespace = true

[editor.soft-wrap]
enable = true
wrap-at-text-width = true
