# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = """
[╭─](dimmed white) \
[$username@$hostname ](green)\
$shell\
$directory \
$git_branch$git_status
[╰─](dimmed white)$character"""

# Use custom right prompt format
right_format = "$cmd_duration${custom.github}"

# Disable the blank line at the start of the prompt
add_newline = false

[username]
show_always = true
format = "$user"

[hostname]
ssh_only = false
format = "$hostname"

[shell]
disabled = false
format = '[$indicator]($style)'
style = 'white'
nu_indicator = ''
zsh_indicator = 'zsh '
unknown_indicator = ' '

[directory]
truncation_length = 8
style = 'blue'
substitutions = [
  { from = "/files/config/", to = "/…/"}
]

[custom.github]
command = "git config --get remote.origin.url | sed -E 's#(git@github.com:|https://github.com/)##; s#\\.git$##'"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output](dimmed purple)"

[cmd_duration]
min_time = 0
format = "[took $duration]($style) "
style = "dimmed white"

[git_branch]
style = 'purple'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
format = "[$conflicted$deleted$modified$renamed$typechanged$staged$untracked$ahead_behind$stashed]($style)"

conflicted = "[=${count} ](bold red)"
deleted    = "[✘${count} ](red)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](yellow)"
typechanged= "[T${count} ](yellow)"
staged     = "[+${count} ](green)"
untracked  = "[?${count} ](purple)"

ahead      = "[⇡${count} ](blue)"
behind     = "[⇣${count} ](blue)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](yellow)"

stashed    = "[*${count} ](dimmed purple)"
